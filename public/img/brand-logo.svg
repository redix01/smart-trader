    <path d="M68 34 H84 V50" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="132" y="72" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" letter-spacing="0.2">
    <tspan fill="#ffffff">Fortis </tspan><tspan fill="#3b82f6">Marketpro</tspan>
  </text>
